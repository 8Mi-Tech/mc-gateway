# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Golang Build

on:
  workflow_dispatch: {}
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds
          - goos: linux
            goarch: amd64
            name: linux-amd64
          - goos: linux
            goarch: arm64
            name: linux-arm64
          - goos: linux
            goarch: arm
            goarm: 7
            name: linux-armv7
          - goos: linux
            goarch: arm
            goarm: 6
            name: linux-armv6
          - goos: linux
            goarch: 386
            name: linux-386
          - goos: linux
            goarch: loong64
            name: linux-loong64
          - goos: linux
            goarch: mips
            name: linux-mips
          - goos: linux
            goarch: mips64
            name: linux-mips64
          - goos: linux
            goarch: mips64le
            name: linux-mips64le
          - goos: linux
            goarch: mipsle
            name: linux-mipsle
          - goos: linux
            goarch: ppc64
            name: linux-ppc64
          - goos: linux
            goarch: ppc64le
            name: linux-ppc64le
          - goos: linux
            goarch: riscv64
            name: linux-riscv64
          - goos: linux
            goarch: s390x
            name: linux-s390x

          # Windows builds
          - goos: windows
            goarch: amd64
            name: windows-amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            name: windows-arm64
            ext: .exe
          - goos: windows
            goarch: 386
            name: windows-386
            ext: .exe

          # macOS builds
          - goos: darwin
            goarch: amd64
            name: darwin-amd64
          - goos: darwin
            goarch: arm64
            name: darwin-arm64

          # FreeBSD builds
          - goos: freebsd
            goarch: amd64
            name: freebsd-amd64
          - goos: freebsd
            goarch: arm64
            name: freebsd-arm64
          - goos: freebsd
            goarch: 386
            name: freebsd-386
          - goos: freebsd
            goarch: arm
            name: freebsd-arm
          - goos: freebsd
            goarch: riscv64
            name: freebsd-riscv64

          - goos: aix
            goarch: ppc64
            name: aix-ppc64
          - goos: dragonfly
            goarch: amd64
            name: dragonfly-amd64
          - goos: illumos
            goarch: amd64
            name: illumos-amd64
          - goos: netbsd
            goarch: 386
            name: netbsd-386
          - goos: netbsd
            goarch: amd64
            name: netbsd-amd64
          - goos: netbsd
            goarch: arm
            name: netbsd-arm
          - goos: netbsd
            goarch: arm64
            name: netbsd-arm64
          - goos: openbsd
            goarch: 386
            name: openbsd-386
          - goos: openbsd
            goarch: amd64
            name: openbsd-amd64
          - goos: openbsd
            goarch: arm
            name: openbsd-arm
          - goos: openbsd
            goarch: arm64
            name: openbsd-arm64
          - goos: openbsd
            goarch: ppc64
            name: openbsd-ppc64
          - goos: openbsd
            goarch: riscv64
            name: openbsd-riscv64
          - goos: plan9
            goarch: 386
            name: plan9-386
          - goos: plan9
            goarch: amd64
            name: plan9-amd64
          - goos: plan9
            goarch: arm
            name: plan9-arm
          - goos: solaris
            goarch: amd64
            name: solaris-amd64
          - goos: js
            goarch: wasm
            name: js-wasm
          - goos: wasip1
            goarch: wasm
            name: wasip1-wasm

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.24.4'

    - name: Build Gateway
      run: go build -ldflags="-s -w" -o gateway-${{ matrix.name }}${{ matrix.ext }} ./cmd/gateway
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        GOARM: ${{ matrix.goarm }}

    - name: Build KCP
      run: go build -ldflags="-s -w" -o kcp-${{ matrix.name }}${{ matrix.ext }} ./cmd/kcp
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        GOARM: ${{ matrix.goarm }}

    - name: Build QUIC
      run: go build -ldflags="-s -w" -o quic-${{ matrix.name }}${{ matrix.ext }} ./cmd/quic
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        GOARM: ${{ matrix.goarm }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: binaries-${{ matrix.name }}
        retention-days: 1
        path: |
          gateway-${{ matrix.name }}${{ matrix.ext }}
          kcp-${{ matrix.name }}${{ matrix.ext }}
          quic-${{ matrix.name }}${{ matrix.ext }}

  Upload-Nightly:
    permissions: 
      contents: write
    if: ${{ github.event_name != 'workflow_dispatch' && github.ref_type == 'branch' && !startsWith(github.event_name, 'pull_request') }}
    needs: [build]
    runs-on: ubuntu-latest
    steps:
    - name: Download all workflow run artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts/
        merge-multiple: true

    - name: Display structure
      run: ls -la ./artifacts

    - name: Delete current release assets
      uses: 8Mi-Tech/delete-release-assets-action@main
      with:
        tag: Nightly-${{ github.ref_name }}
        deleteOnlyFromDrafts: false
   
    - name: Set Env
      run: |
        echo "BUILDTIME=$(TZ=Asia/Shanghai date)" >> $GITHUB_ENV
      shell: bash

    - name: Tag Repo
      uses: richardsimko/update-tag@v1
      with:
        tag_name: Nightly-${{ github.ref_name }}
      
    - run: |
        cat > release.txt << 'EOF'
        更新于 ${{ env.BUILDTIME }}, 与分支 ${{ github.ref_name }} 保持同步最新
        <br>
        EOF

    - name: Upload Nightly
      uses: softprops/action-gh-release@v3
      if: ${{  success() }}
      with:
        name: "主分支 Nightly"
        tag_name: Nightly-${{ github.ref_name }}
        files: |
          artifacts/*
        prerelease: true
        generate_release_notes: true
        body_path: release.txt
