# pid 文件
pid_file = "gateway.pid"

[log]
level = "warn"
file = "logs/mc1.log"

[tcp]
enable = true
port = 25565

[quic]
enable = true
port = 25565
pid_file = ["minecraft", "quic", "raw", "h3"]

[kcp]
enable = true
port = 25566
data_shards = 10
parity_shards = 3

[hosts]
dev = "mc1:25565"
"dev.lan" = "mc1:25568"
